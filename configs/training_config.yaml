# QLoRA training config — consumed by notebooks/train_colab.ipynb

model:
  base_id: "Qwen/Qwen2.5-1.5B-Instruct"
  trust_remote_code: false

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: "bfloat16"

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.0
  max_seq_length: 1024
  bf16: true
  gradient_checkpointing: true
  logging_steps: 25
  eval_steps: 200
  save_steps: 200
  save_total_limit: 2
  report_to: "wandb"

data:
  train_path: "data/processed/train.jsonl"
  val_path: "data/processed/val.jsonl"
  text_field: "text"

hub:
  repo_id: "tusharislampure29/qwen2.5-1.5b-marathi-instruct"
  push_adapter_only: true
  private: false
